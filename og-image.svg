<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
    </pattern>

    <!-- Vertical falling matrix dots -->
    <pattern id="matrixDots" patternUnits="userSpaceOnUse" width="80" height="630">
      <circle cx="40" cy="80" r="1" fill="#00ff41" opacity="0.15"/>
      <circle cx="40" cy="160" r="1" fill="#00ff41" opacity="0.1"/>
      <circle cx="40" cy="240" r="1" fill="#00ff41" opacity="0.08"/>
      <circle cx="40" cy="320" r="1" fill="#00ff41" opacity="0.06"/>
      <circle cx="40" cy="400" r="1" fill="#00ff41" opacity="0.04"/>
    </pattern>

    <!-- Text glow filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for title -->
    <filter id="bigGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00ff41" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan lines -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1200" height="4">
      <rect width="1200" height="2" fill="rgba(0,255,65,0.02)"/>
      <rect y="2" width="1200" height="2" fill="transparent"/>
    </pattern>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid pattern background -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Matrix dots overlay -->
  <rect width="1200" height="630" fill="url(#matrixDots)"/>

  <!-- Scan lines overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Decorative corner brackets — top left -->
  <path d="M 60 80 L 60 60 L 80 60" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.3"/>
  <!-- Top right -->
  <path d="M 1140 80 L 1140 60 L 1120 60" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.3"/>
  <!-- Bottom left -->
  <path d="M 60 550 L 60 570 L 80 570" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.3"/>
  <!-- Bottom right -->
  <path d="M 1140 550 L 1140 570 L 1120 570" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.3"/>

  <!-- Main title: BTTR -->
  <text
    x="600"
    y="300"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="160"
    font-weight="bold"
    fill="#00ff41"
    filter="url(#bigGlow)"
    letter-spacing="20"
  >BTTR</text>

  <!-- Divider line -->
  <line x1="420" y1="365" x2="780" y2="365" stroke="#00ff41" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text
    x="600"
    y="420"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="32"
    fill="#888888"
    letter-spacing="8"
  >The Better Framework</text>

  <!-- Tagline -->
  <text
    x="600"
    y="470"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="16"
    fill="#555555"
    letter-spacing="4"
  >Build. Test. Trash. Repeat.</text>

  <!-- Faint horizontal glitch lines -->
  <rect x="0" y="195" width="1200" height="1" fill="#00ff41" opacity="0.06"/>
  <rect x="0" y="410" width="1200" height="1" fill="#00ff41" opacity="0.04"/>
  <rect x="200" y="520" width="300" height="1" fill="#00ff41" opacity="0.05"/>
</svg>
